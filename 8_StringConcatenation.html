<body>


    <h1>String Concatenation</h1>
    <h1>Template String / Template Literal</h1>

    <script>

        let name = "Soniya";
        let surname = "Singhaniya";

        console.log(name + surname);

        console.log("my name is " + name + ", and my surname is " + surname);
        // console.log(name.concat(" and my surname is ", surname));


        // Template String / Template Literal - ES6 (2015);

        console.log(`My name is ${name}, and my surname is ${surname}`);










    </script>
</body>

</html>
