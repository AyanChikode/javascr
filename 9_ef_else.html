        let per = prompt("Enter your % : ");

        if (per >= 65 && per <= 100) {
            console.log("A+ with Distinction");
        } else if (per >= 60 && per < 65) {
            console.log("A Grade");
        } else if (per >= 50 && per < 60) {
            console.log("B Grade");
        } else if (per >= 40 && per < 50) {
            console.log("C Grade");
        } else if (per >= 35 && per < 40) {
            console.log("D Grade");
        } else if (per >= 0 && per < 35) {
            console.log("Study Hard");
        } else {
            console.log("Invalid Input")
        };












    </script>
