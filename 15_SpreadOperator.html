<body>


    <h1>Spread Operator - ES6 (2015)</h1>



    <script>

        let boys = ["amit", "sumit", "Prakash"];
        let girls = ["Pinki", "Chinki"];
        let staff = ["Priya", "Payal", "Priyanka"]


        let allStudents = [...boys, ...girls];
        console.log(allStudents, "-", allStudents.length); // 5

        // console.log([...boys, ...girls, ...staff, "Prajakta"]);

        let allMembers = [...boys, ...girls, ...staff, "Abhijit Gatade"]; // 9
        console.log(allMembers, "-", allMembers.length);

















    </script>


</body>
