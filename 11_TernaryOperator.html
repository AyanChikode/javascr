<body>

    <h1>Ternary Operator - ES6 (2015) / Conditional Operator</h1>


    <script>


        // Ternary Operator
        // let age = 12;

        // (age >= 18) ? console.log("You Can Drive") : console.log("You can't Drive");


        // ----------------------------------------------------------------
        // Ternary Operator using multiple conditions

        let per = prompt("Enter Your Percentage : ");

        (per >= 65) ? console.log("A+ with Distinction")
            : (per >= 60) ? console.log("A Grade")
                : (per >= 50) ? console.log("B Grade")
                    : (per >= 40) ? console.log("C Grade")
                        : (per >= 35) ? console.log("D Grade")
                            : console.log("Study Hard")






    </script>

</body>
