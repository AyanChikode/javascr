        let fruits = ["Apple", "Mango", "Orange", "Grapes"];

        console.log(fruits.length);

        let newFruits = fruits.toString();
        console.log(newFruits);


        console.log(fruits);

        // push()
        fruits.push("Kiwi");
        fruits.push("Chiku");

        console.log(fruits);

        // pop()
        fruits.pop();
        fruits.pop();
        fruits.pop();
        console.log(fruits);

        // unshift()
        fruits.unshift("PineApple");
        fruits.unshift("Strawberry");
        console.log(fruits);

        // shift()
        fruits.shift();
        fruits.shift();
